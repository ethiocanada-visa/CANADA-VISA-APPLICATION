<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Canada Visa Tracking</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#f4f7fb;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow:hidden;
position:relative;
}

/* BACKGROUND */

.bg{
position:absolute;
inset:0;
background:
linear-gradient(
135deg,
rgba(11,23,39,0.96),
rgba(15,23,42,0.92)
),
url('https://images.unsplash.com/photo-1521295121783-8a321d551ad2?q=80&w=2070&auto=format&fit=crop');
background-size:cover;
background-position:center;
z-index:-2;
}

.glow1{
position:absolute;
width:400px;
height:400px;
background:#d52b1e;
filter:blur(150px);
opacity:0.25;
top:-100px;
left:-100px;
z-index:-1;
}

.glow2{
position:absolute;
width:350px;
height:350px;
background:#2563eb;
filter:blur(150px);
opacity:0.18;
bottom:-120px;
right:-100px;
z-index:-1;
}

/* CARD */

.card{
width:100%;
max-width:520px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.1);
border-radius:32px;
padding:38px 30px;
box-shadow:0 20px 60px rgba(0,0,0,0.35);
color:white;
}

.logo{
display:flex;
align-items:center;
justify-content:center;
gap:14px;
margin-bottom:28px;
}

.logo img{
width:60px;
height:60px;
border-radius:16px;
}

.logo-text h1{
font-size:28px;
font-weight:800;
}

.logo-text p{
font-size:13px;
color:#cbd5e1;
margin-top:4px;
}

/* TITLE */

.title{
text-align:center;
margin-bottom:28px;
}

.title h2{
font-size:34px;
font-weight:800;
margin-bottom:10px;
}

.title p{
font-size:15px;
color:#cbd5e1;
line-height:1.6;
}

/* SEARCH */

.search-box{
display:flex;
flex-direction:column;
gap:16px;
margin-bottom:24px;
}

.search-box input{
padding:18px;
border:none;
outline:none;
border-radius:18px;
background:rgba(255,255,255,0.12);
color:white;
font-size:16px;
}

.search-box input::placeholder{
color:#cbd5e1;
}

.search-btn{
padding:18px;
border:none;
border-radius:18px;
background:linear-gradient(
90deg,
#d52b1e,
#ff3b30
);
color:white;
font-size:16px;
font-weight:800;
cursor:pointer;
box-shadow:0 12px 25px rgba(213,43,30,0.35);
transition:.3s;
}

.search-btn:hover{
transform:translateY(-2px);
}

/* RESULT */

.result{
display:none;
margin-top:25px;
background:rgba(255,255,255,0.08);
border-radius:24px;
padding:24px;
border:1px solid rgba(255,255,255,0.1);
}

.profile{
width:110px;
height:110px;
border-radius:24px;
object-fit:cover;
border:4px solid white;
display:block;
margin:auto;
margin-bottom:20px;
}

.info{
display:flex;
flex-direction:column;
gap:16px;
}

.info-item{
background:rgba(255,255,255,0.08);
padding:16px;
border-radius:16px;
}

.info-item h4{
font-size:13px;
color:#cbd5e1;
margin-bottom:6px;
}

.info-item p{
font-size:17px;
font-weight:700;
}

.status{
padding:14px;
border-radius:16px;
font-weight:800;
text-align:center;
margin-top:10px;
font-size:15px;
}

.processing{
background:#f59e0b;
}

.approved{
background:#16a34a;
}

.rejected{
background:#dc2626;
}

/* NOT FOUND */

.not-found{
display:none;
margin-top:20px;
padding:18px;
border-radius:16px;
background:rgba(220,38,38,0.18);
text-align:center;
font-weight:700;
}

/* MOBILE */

@media(max-width:600px){

.card{
padding:30px 20px;
border-radius:24px;
}

.title h2{
font-size:28px;
}

}

</style>

</head>

<body>

<div class="bg"></div>
<div class="glow1"></div>
<div class="glow2"></div>

<div class="card">

<div class="logo">

<img src="https://upload.wikimedia.org/wikipedia/commons/d/d9/Flag_of_Canada_%28Pantone%29.svg">

<div class="logo-text">

<h1>Canada Visa</h1>

<p>
Embassy Tracking Portal
</p>

</div>

</div>

<div class="title">

<h2>
Track Your Visa
</h2>

<p>
Enter your Unique ID to check your Canada visa application status
</p>

</div>

<div class="search-box">

<input
type="text"
id="searchID"
placeholder="Enter Unique ID">

<button
class="search-btn"
onclick="trackVisa()">

<i class="fa-solid fa-magnifying-glass"></i>
Track Application

</button>

</div>

<div class="not-found" id="notFound">

Application not found

</div>

<div class="result" id="result">

<img
id="profileImage"
class="profile"
src="">

<div class="info">

<div class="info-item">

<h4>Full Name</h4>

<p id="fullName"></p>

</div>

<div class="info-item">

<h4>Unique ID</h4>

<p id="uniqueID"></p>

</div>

<div class="info-item">

<h4>ID Number</h4>

<p id="idNumber"></p>

</div>

<div
class="status"
id="statusBox">

</div>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyDMOQzKuw8IVrq0kh35tNC-P6PuiHlIA-g",

authDomain: "canada-visa-system-f9c45.firebaseapp.com",

projectId: "canada-visa-system-f9c45",

storageBucket: "canada-visa-system-f9c45.firebasestorage.app",

messagingSenderId: "772100856692",

appId: "1:772100856692:web:8e73ad0fe503b24342ea21",

measurementId: "G-046K5CHHJV"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.trackVisa = async function(){

const input =
document.getElementById("searchID").value.trim();

const result =
document.getElementById("result");

const notFound =
document.getElementById("notFound");

result.style.display="none";
notFound.style.display="none";

const querySnapshot =
await getDocs(collection(db,"users"));

let found = false;

querySnapshot.forEach((doc)=>{

const data = doc.data();

if(data.uniqueid === input){

found = true;

document.getElementById("profileImage").src =
data.photo || "https://cdn-icons-png.flaticon.com/512/149/149071.png";

document.getElementById("fullName").innerText =
data.fullname;

document.getElementById("uniqueID").innerText =
data.uniqueid;

document.getElementById("idNumber").innerText =
data.idnumber;

const statusBox =
document.getElementById("statusBox");

statusBox.innerText =
data.passport;

statusBox.className = "status";

if(data.passport === "Approved"){

statusBox.classList.add("approved");

}else if(data.passport === "Rejected"){

statusBox.classList.add("rejected");

}else{

statusBox.classList.add("processing");

}

result.style.display="block";

}

});

if(!found){

notFound.style.display="block";

}

}

</script>

</body>
  </html>
