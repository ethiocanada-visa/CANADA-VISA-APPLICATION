<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Canada Embassy Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
position:relative;
background:#0f172a;
}

/* BACKGROUND */

.bg{
position:absolute;
inset:0;
background:
linear-gradient(
135deg,
rgba(11,23,39,0.95),
rgba(15,23,42,0.92)
),
url('https://images.unsplash.com/photo-1517935706615-2717063c2225?q=80&w=2070&auto=format&fit=crop');

background-size:cover;
background-position:center;
z-index:-2;
}

.glow1{
position:absolute;
width:400px;
height:400px;
background:#d52b1e;
filter:blur(150px);
opacity:0.25;
top:-100px;
left:-100px;
z-index:-1;
}

.glow2{
position:absolute;
width:350px;
height:350px;
background:#2563eb;
filter:blur(150px);
opacity:0.18;
bottom:-120px;
right:-100px;
z-index:-1;
}

/* LOGIN CARD */

.login-card{
width:100%;
max-width:430px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.1);
border-radius:32px;
padding:40px 30px;
box-shadow:0 20px 60px rgba(0,0,0,0.35);
color:white;
}

.logo{
display:flex;
flex-direction:column;
align-items:center;
margin-bottom:30px;
}

.logo img{
width:80px;
height:80px;
border-radius:20px;
margin-bottom:18px;
}

.logo h1{
font-size:32px;
font-weight:800;
margin-bottom:8px;
}

.logo p{
font-size:14px;
color:#cbd5e1;
text-align:center;
line-height:1.6;
}

/* INPUTS */

.input-group{
margin-bottom:20px;
}

.input-group label{
display:block;
font-size:14px;
font-weight:700;
margin-bottom:10px;
color:#e2e8f0;
}

.input-box{
position:relative;
}

.input-box i{
position:absolute;
left:18px;
top:50%;
transform:translateY(-50%);
color:#cbd5e1;
font-size:16px;
}

.input-box input{
width:100%;
padding:18px 18px 18px 50px;
border:none;
outline:none;
border-radius:18px;
background:rgba(255,255,255,0.12);
color:white;
font-size:15px;
}

.input-box input::placeholder{
color:#cbd5e1;
}

/* BUTTON */

.login-btn{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:linear-gradient(
90deg,
#d52b1e,
#ff3b30
);
color:white;
font-size:16px;
font-weight:800;
cursor:pointer;
margin-top:10px;
box-shadow:0 12px 25px rgba(213,43,30,0.35);
transition:.3s;
}

.login-btn:hover{
transform:translateY(-2px);
}

/* ERROR */

.error{
margin-top:18px;
padding:14px;
border-radius:14px;
background:rgba(220,38,38,0.2);
text-align:center;
display:none;
font-weight:700;
}

/* FOOTER */

.footer{
margin-top:25px;
text-align:center;
font-size:13px;
color:#cbd5e1;
line-height:1.6;
}

@media(max-width:500px){

.login-card{
margin:15px;
padding:35px 22px;
border-radius:24px;
}

.logo h1{
font-size:28px;
}

}

</style>

</head>

<body>

<div class="bg"></div>
<div class="glow1"></div>
<div class="glow2"></div>

<div class="login-card">

<div class="logo">

<img src="https://upload.wikimedia.org/wikipedia/commons/d/d9/Flag_of_Canada_%28Pantone%29.svg">

<h1>
Canada Embassy
</h1>

<p>
Secure Immigration & Visa Management System
</p>

</div>

<div class="input-group">

<label>
Admin Email
</label>

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
id="email"
placeholder="Enter admin email">

</div>

</div>

<div class="input-group">

<label>
Password
</label>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="password"
placeholder="Enter password">

</div>

</div>

<button
class="login-btn"
onclick="login()">

<i class="fa-solid fa-right-to-bracket"></i>
Login Dashboard

</button>

<div class="error" id="error">

Invalid email or password

</div>

<div class="footer">

Canada Embassy Secure Access Portal 🇨🇦

</div>

</div>

<script>

function login(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

if(
email === "admin@canada.ca"
&&
password === "canada123"
){

window.location.href = "index.html";

}else{

document.getElementById("error").style.display = "block";

}

}

</script>

</body>
  </html>
