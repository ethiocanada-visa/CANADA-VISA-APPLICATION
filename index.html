<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canada Visa Dashboard</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f7fb;
margin:0;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
gap:10px;
}

.title{
font-size:30px;
font-weight:bold;
color:#1f3c88;
}

.btn{
padding:10px 16px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
color:white;
}

.red{
background:#d52b1e;
}

.gray{
background:#666;
}

.blue{
background:#d52b1e;
width:100%;
margin-top:15px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
border-left:5px solid #d52b1e;
}

.form-box{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

input{
padding:12px;
border:1px solid #ccc;
border-radius:8px;
width:100%;
box-sizing:border-box;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#1f3c88;
color:white;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
font-size:14px;
}

.profile{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:2px solid #d52b1e;
}

.status{
padding:5px 10px;
border-radius:5px;
color:white;
font-size:12px;
font-weight:bold;
}

.approved{
background:green;
}

.rejected{
background:red;
}

.processing{
background:orange;
}

.delete{
background:#e63946;
}

.edit{
background:#ff9800;
}

.print{
background:#673ab7;
}

#notification{
position:fixed;
top:20px;
right:20px;
background:green;
color:white;
padding:15px 20px;
border-radius:10px;
display:none;
font-weight:bold;
z-index:1000;
}

@media(max-width:700px){

.form-grid{
grid-template-columns:1fr;
}

table{
font-size:12px;
}

}

</style>
</head>

<body>

<div id="notification">
Success
</div>

<div class="container">

<div class="header">

<div>

<h1 class="title">
🇨🇦 Canada Visa Admin Dashboard
</h1>

<p>
Manage applicants and passport status
</p>

</div>

<div>

<button class="btn red">
New Applicant
</button>

<button class="btn gray" onclick="logout()">
Logout
</button>

</div>

</div>

<div class="cards">

<div class="card">
<h3>Total Applicants</h3>
<h1 id="total">0</h1>
</div>

<div class="card">
<h3>Approved</h3>
<h1 id="approvedCount">0</h1>
</div>

<div class="card">
<h3>Rejected</h3>
<h1 id="rejectedCount">0</h1>
</div>

<div class="card">
<h3>Processing</h3>
<h1 id="processingCount">0</h1>
</div>

</div>

<div class="form-box">

<h2>Register Applicant</h2>

<div class="form-grid">

<input
type="text"
id="fullname"
placeholder="Full Name">

<input
type="text"
id="uniqueid"
placeholder="Unique ID">

<input
type="text"
id="idnumber"
placeholder="ID Number">

<input
type="text"
id="passport"
placeholder="Passport Status">

<input
type="file"
id="photo"
accept="image/*">

</div>

<button class="btn blue" onclick="addUser()">
Register User
</button>

</div>

<div class="form-box">

<h2>Registered Users</h2>

<input
type="text"
id="search"
placeholder="Search Applicant"
onkeyup="searchUser()"
style="margin-bottom:15px;">

<table>

<thead>

<tr>
<th>Photo</th>
<th>Name</th>
<th>Unique ID</th>
<th>ID Number</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody id="userdata"></tbody>

</table>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyDMOQzKuw8IVrq0kh35tNC-P6PuiHlIA-g",

authDomain: "canada-visa-system-f9c45.firebaseapp.com",

projectId: "canada-visa-system-f9c45",

storageBucket: "canada-visa-system-f9c45.firebasestorage.app",

messagingSenderId: "772100856692",

appId: "1:772100856692:web:8e73ad0fe503b24342ea21",

measurementId: "G-046K5CHHJV"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.showNotification = function(message){

const notification =
document.getElementById("notification");

notification.innerText = message;

notification.style.display = "block";

setTimeout(()=>{

notification.style.display = "none";

},3000);

}

window.logout = function(){

localStorage.removeItem(
"adminLoggedIn"
);

window.location.href = "login.html";

}

window.addUser = async function(){

const fullname =
document.getElementById("fullname").value;

const uniqueid =
document.getElementById("uniqueid").value;

const idnumber =
document.getElementById("idnumber").value;

const passport =
document.getElementById("passport").value;

const photoInput =
document.getElementById("photo");

const file =
photoInput.files[0];

if(
fullname === "" ||
uniqueid === "" ||
idnumber === "" ||
passport === ""
){

showNotification(
"⚠️ Fill all fields"
);

return;

}

let photoUrl = "";

if(file){

const reader = new FileReader();

reader.readAsDataURL(file);

photoUrl = await new Promise((resolve)=>{

reader.onload = ()=> resolve(reader.result);

});

}

await addDoc(collection(db,"users"),{

fullname: fullname,
uniqueid: uniqueid,
idnumber: idnumber,
passport: passport,
photo: photoUrl

});

showNotification(
"✅ Applicant Registered"
);

setTimeout(()=>{

location.reload();

},1000);

}

async function loadUsers(){

const querySnapshot =
await getDocs(collection(db,"users"));

const table =
document.getElementById("userdata");

table.innerHTML = "";

let total = 0;
let approved = 0;
let rejected = 0;
let processing = 0;

querySnapshot.forEach((userDoc)=>{

total++;

const data = userDoc.data();

let statusClass = "processing";

if(
data.passport.toLowerCase()
.includes("approved")
){

approved++;
statusClass = "approved";

}
else if(
data.passport.toLowerCase()
.includes("rejected")
){

rejected++;
statusClass = "rejected";

}
else{

processing++;

}

table.innerHTML += `

<tr>

<td>

<img
src="${data.photo}"
class="profile"
onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">

</td>

<td>${data.fullname}</td>

<td>${data.uniqueid}</td>

<td>${data.idnumber}</td>

<td>

<span class="status ${statusClass}">
${data.passport}
</span>

</td>

<td>

<button
class="btn print"
onclick="printSlip(
'${data.fullname}',
'${data.uniqueid}',
'${data.idnumber}',
'${data.passport}',
'${data.photo}'
)">
Print
</button>

<button
class="btn edit"
onclick="editUser(
'${data.fullname}',
'${data.uniqueid}',
'${data.idnumber}',
'${data.passport}'
)">
Edit
</button>

<button
class="btn delete"
onclick="deleteUser('${userDoc.id}')">
Delete
</button>

</td>

</tr>

`;

});

document.getElementById("total").innerText =
total;

document.getElementById("approvedCount").innerText =
approved;

document.getElementById("rejectedCount").innerText =
rejected;

document.getElementById("processingCount").innerText =
processing;

}

window.editUser = function(
fullname,
uniqueid,
idnumber,
passport
){

document.getElementById("fullname").value =
fullname;

document.getElementById("uniqueid").value =
uniqueid;

document.getElementById("idnumber").value =
idnumber;

document.getElementById("passport").value =
passport;

showNotification(
"✏️ Applicant Loaded"
);

}

window.deleteUser = async function(id){

await deleteDoc(doc(db,"users",id));

showNotification(
"🗑 Deleted"
);

setTimeout(()=>{

location.reload();

},1000);

}

window.searchUser = function(){

const input =
document.getElementById("search")
.value.toLowerCase();

const rows =
document.querySelectorAll("#userdata tr");

rows.forEach((row)=>{

const text =
row.innerText.toLowerCase();

if(text.includes(input)){

row.style.display = "";

}else{

row.style.display = "none";

}

});

}

window.printSlip = function(
fullname,
uniqueid,
idnumber,
passport,
photo
){

const win = window.open("");

win.document.write(`

<h2>
Canada Visa Application Slip
</h2>

<img
src="${photo}"
width="120"
height="120"
style="border-radius:10px;">

<p>
<b>Full Name:</b>
${fullname}
</p>

<p>
<b>Unique ID:</b>
${uniqueid}
</p>

<p>
<b>ID Number:</b>
${idnumber}
</p>

<p>
<b>Status:</b>
${passport}
</p>

`);

win.print();

}

loadUsers();

</script>

</body>
  </html>
