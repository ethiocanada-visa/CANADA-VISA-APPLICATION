<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Canada Embassy Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#eef3f9;
padding:20px;
color:#0f172a;
}

.container{
max-width:1500px;
margin:auto;
}

.header{
background:white;
padding:35px;
border-radius:30px;
box-shadow:0 10px 30px rgba(15,23,42,0.06);
margin-bottom:25px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:20px;
}

.header h1{
font-size:38px;
font-weight:900;
}

.header p{
color:#64748b;
margin-top:6px;
}

.search{
padding:16px 20px;
border-radius:18px;
border:1px solid #dbe2ea;
width:300px;
font-size:15px;
outline:none;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:30px;
border-radius:28px;
box-shadow:0 10px 30px rgba(15,23,42,0.06);
}

.card h2{
font-size:40px;
font-weight:900;
margin-bottom:10px;
}

.card p{
color:#64748b;
font-weight:600;
}

.form-box{
background:white;
padding:35px;
border-radius:30px;
box-shadow:0 10px 30px rgba(15,23,42,0.06);
margin-bottom:25px;
}

.form-box h2{
font-size:30px;
font-weight:900;
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

input,
select{
padding:18px;
border-radius:18px;
border:1px solid #dbe2ea;
background:#f8fafc;
font-size:15px;
outline:none;
width:100%;
}

.form-box button{
margin-top:20px;
padding:18px 28px;
border:none;
border-radius:18px;
background:linear-gradient(90deg,#d52b1e,#ff3b30);
color:white;
font-weight:800;
cursor:pointer;
font-size:15px;
}

.table-box{
background:white;
padding:35px;
border-radius:30px;
box-shadow:0 10px 30px rgba(15,23,42,0.06);
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#f8fafc;
padding:18px;
text-align:left;
font-size:14px;
}

td{
padding:18px;
border-bottom:1px solid #eef2f7;
font-size:14px;
}

.user-photo{
width:70px;
height:70px;
object-fit:cover;
border-radius:18px;
border:3px solid #d52b1e;
}

.status{
padding:10px 14px;
border-radius:14px;
font-size:12px;
font-weight:800;
display:inline-block;
}

.approved{
background:#dcfce7;
color:#16a34a;
}

.processing{
background:#ffedd5;
color:#ea580c;
}

.rejected{
background:#fee2e2;
color:#dc2626;
}

.action-btn{
padding:10px 14px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:700;
margin-right:6px;
}

.delete{
background:#dc2626;
color:white;
}

.file-box{
background:#f8fafc;
padding:18px;
border-radius:18px;
border:1px solid #dbe2ea;
}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

.header{
flex-direction:column;
align-items:flex-start;
}

.search{
width:100%;
}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div>

<h1>Canada Embassy Dashboard</h1>

<p>
Professional Immigration Management System
</p>

</div>

<input
type="text"
class="search"
placeholder="Search applicants..."
id="searchInput">

</div>

<div class="stats">

<div class="card">

<h2 id="totalApplicants">0</h2>

<p>Total Applicants</p>

</div>

<div class="card">

<h2 id="approvedApplicants">0</h2>

<p>Approved</p>

</div>

<div class="card">

<h2 id="rejectedApplicants">0</h2>

<p>Rejected</p>

</div>

<div class="card">

<h2 id="processingApplicants">0</h2>

<p>Processing</p>

</div>

</div>

<div class="form-box">

<h2>Register Applicant</h2>

<div class="grid">

<input
type="text"
id="fullname"
placeholder="Full Name">

<input
type="text"
id="uniqueid"
placeholder="Unique ID">

<input
type="text"
id="idnumber"
placeholder="ID Number">

<select id="passport">

<option>Processing</option>
<option>Approved</option>
<option>Rejected</option>

</select>

</div>

<br>

<div class="file-box">

<input
type="file"
id="photo"
accept="image/*">

</div>

<button onclick="registerApplicant()">

Register User

</button>

</div>

<div class="table-box">

<h2 style="font-size:30px;font-weight:900;">
Registered Applicants
</h2>

<table>

<thead>

<tr>

<th>Photo</th>
<th>Name</th>
<th>Unique ID</th>
<th>ID Number</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyDMOQzKuw8IVrq0kh35tNC-P6PuiHlIA-g",

authDomain: "canada-visa-system-f9c45.firebaseapp.com",

projectId: "canada-visa-system-f9c45",

storageBucket: "canada-visa-system-f9c45.firebasestorage.app",

messagingSenderId: "772100856692",

appId: "1:772100856692:web:8e73ad0fe503b24342ea21"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

let applicants=[];

window.registerApplicant = async function(){

const fullname =
document.getElementById("fullname").value;

const uniqueid =
document.getElementById("uniqueid").value;

const idnumber =
document.getElementById("idnumber").value;

const passport =
document.getElementById("passport").value;

const file =
document.getElementById("photo").files[0];

if(
!fullname ||
!uniqueid ||
!idnumber ||
!file
){
alert("Please fill all fields");
return;
}

const photo =
URL.createObjectURL(file);

await addDoc(collection(db,"users"),{

fullname,
uniqueid,
idnumber,
passport,
photo

});

alert("Applicant Registered Successfully");

location.reload();

}

async function loadApplicants(){

const querySnapshot =
await getDocs(collection(db,"users"));

applicants=[];

querySnapshot.forEach((docItem)=>{

applicants.push({

id:docItem.id,
...docItem.data()

});

});

renderApplicants();

updateStats();

}

function renderApplicants(){

const tableBody =
document.getElementById("tableBody");

tableBody.innerHTML="";

applicants.forEach((applicant)=>{

let statusClass="processing";

if(applicant.passport==="Approved"){

statusClass="approved";

}
else if(applicant.passport==="Rejected"){

statusClass="rejected";

}

tableBody.innerHTML += `

<tr>

<td>

<img
src="${applicant.photo}"
class="user-photo">

</td>

<td>${applicant.fullname}</td>

<td>${applicant.uniqueid}</td>

<td>${applicant.idnumber}</td>

<td>

<span class="status ${statusClass}">
${applicant.passport}
</span>

</td>

<td>

<button
class="action-btn delete"
onclick="deleteApplicant('${applicant.id}')">

Delete

</button>

</td>

</tr>

`;

});

}

window.deleteApplicant = async function(id){

await deleteDoc(doc(db,"users",id));

alert("Applicant Deleted");

location.reload();

}

function updateStats(){

document.getElementById("totalApplicants").innerText =
applicants.length;

document.getElementById("approvedApplicants").innerText =
applicants.filter(
a=>a.passport==="Approved"
).length;

document.getElementById("rejectedApplicants").innerText =
applicants.filter(
a=>a.passport==="Rejected"
).length;

document.getElementById("processingApplicants").innerText =
applicants.filter(
a=>a.passport==="Processing"
).length;

}

document.getElementById("searchInput")
.addEventListener("input",(e)=>{

const value =
e.target.value.toLowerCase();

const filtered =
applicants.filter(a=>

a.fullname.toLowerCase().includes(value) ||
a.uniqueid.toLowerCase().includes(value)

);

const tableBody =
document.getElementById("tableBody");

tableBody.innerHTML="";

filtered.forEach((applicant)=>{

let statusClass="processing";

if(applicant.passport==="Approved"){

statusClass="approved";

}
else if(applicant.passport==="Rejected"){

statusClass="rejected";

}

tableBody.innerHTML += `

<tr>

<td>

<img
src="${applicant.photo}"
class="user-photo">

</td>

<td>${applicant.fullname}</td>

<td>${applicant.uniqueid}</td>

<td>${applicant.idnumber}</td>

<td>

<span class="status ${statusClass}">
${applicant.passport}
</span>

</td>

<td>

<button
class="action-btn delete"
onclick="deleteApplicant('${applicant.id}')">

Delete

</button>

</td>

</tr>

`;

});

});

loadApplicants();

</script>

</body>
  </html>
