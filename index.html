<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Canada Visa Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#f4f7fb;
display:flex;
color:#111827;
}

/* ========= SIDEBAR ========= */

.sidebar{
width:260px;
height:100vh;
position:fixed;
left:0;
top:0;
background:white;
border-right:1px solid #e5e7eb;
padding:25px 18px;
}

.logo{
display:flex;
align-items:center;
gap:12px;
margin-bottom:40px;
}

.logo img{
width:55px;
}

.logo h1{
font-size:24px;
font-weight:800;
color:#0b2c5f;
}

.menu a{
display:block;
padding:15px 18px;
margin-bottom:12px;
border-radius:14px;
text-decoration:none;
font-weight:600;
color:#0b2c5f;
transition:.3s;
}

.menu a:hover{
background:#eef2ff;
}

.menu .active{
background:linear-gradient(
90deg,
#d52b1e,
#ff3b30
);
color:white;
}

/* ========= MAIN ========= */

.main{
margin-left:260px;
width:calc(100% - 260px);
padding:25px;
}

/* ========= TOPBAR ========= */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
flex-wrap:wrap;
gap:15px;
}

.title h1{
font-size:38px;
font-weight:800;
color:#0b2c5f;
}

.title p{
color:#6b7280;
margin-top:5px;
}

.search{
padding:14px 18px;
border-radius:14px;
border:1px solid #d1d5db;
width:300px;
outline:none;
}

/* ========= CARDS ========= */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:25px;
border-radius:22px;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

.card h3{
color:#6b7280;
margin-bottom:10px;
}

.card h1{
font-size:42px;
color:#0b2c5f;
}

/* ========= SECTION ========= */

.section{
background:white;
padding:25px;
border-radius:22px;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
margin-bottom:25px;
}

.section h2{
font-size:28px;
margin-bottom:20px;
color:#0b2c5f;
}

/* ========= FORM ========= */

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

input,
select{
padding:15px;
border-radius:14px;
border:1px solid #d1d5db;
font-size:15px;
outline:none;
}

.register-btn{
margin-top:20px;
width:100%;
padding:16px;
background:#d52b1e;
border:none;
border-radius:14px;
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
}

/* ========= TABLE ========= */

.table-wrap{
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:900px;
}

thead{
background:#0b2c5f;
color:white;
}

th{
padding:18px;
text-align:left;
font-size:14px;
}

td{
padding:18px;
border-bottom:1px solid #e5e7eb;
font-size:14px;
}

.profile{
width:70px;
height:70px;
border-radius:16px;
object-fit:cover;
border:3px solid #d52b1e;
}

.status{
padding:10px 14px;
border-radius:12px;
border:none;
font-weight:700;
color:white;
}

.processing{
background:#f59e0b;
}

.approved{
background:#16a34a;
}

.rejected{
background:#dc2626;
}

.action-btn{
padding:10px 14px;
border:none;
border-radius:12px;
color:white;
font-weight:700;
cursor:pointer;
margin:2px;
}

.edit{
background:#f59e0b;
}

.delete{
background:#dc2626;
}

/* ========= MOBILE ========= */

@media(max-width:1000px){

.sidebar{
display:none;
}

.main{
margin-left:0;
width:100%;
}

.form-grid{
grid-template-columns:1fr;
}

.title h1{
font-size:28px;
}

}

</style>

</head>

<body>

<!-- ========= SIDEBAR ========= -->

<div class="sidebar">

<div class="logo">

<img src="https://upload.wikimedia.org/wikipedia/commons/d/d9/Flag_of_Canada_%28Pantone%29.svg">

<h1>
Canada Visa
</h1>

</div>

<div class="menu">

<a href="#" class="active">
Dashboard
</a>

<a href="#">
Applicants
</a>

<a href="#">
Visa Status
</a>

<a href="#">
Embassy
</a>

<a href="#">
Logout
</a>

</div>

</div>

<!-- ========= MAIN ========= -->

<div class="main">

<div class="topbar">

<div class="title">

<h1>
Canada Embassy Dashboard
</h1>

<p>
Professional immigration management system
</p>

</div>

<input
type="text"
class="search"
placeholder="Search applicants...">

</div>

<!-- ========= CARDS ========= -->

<div class="cards">

<div class="card">

<h3>Total Applicants</h3>

<h1 id="total">
0
</h1>

</div>

<div class="card">

<h3>Approved</h3>

<h1 id="approvedCount">
0
</h1>

</div>

<div class="card">

<h3>Rejected</h3>

<h1 id="rejectedCount">
0
</h1>

</div>

<div class="card">

<h3>Processing</h3>

<h1 id="processingCount">
0
</h1>

</div>

</div>

<!-- ========= REGISTER ========= -->

<div class="section">

<h2>
Register Applicant
</h2>

<div class="form-grid">

<input
type="text"
id="fullname"
placeholder="Full Name">

<input
type="text"
id="uniqueid"
placeholder="Unique ID">

<input
type="text"
id="idnumber"
placeholder="ID Number">

<select id="passport">

<option value="">
Select Status
</option>

<option value="Processing">
Processing
</option>

<option value="Approved">
Approved
</option>

<option value="Rejected">
Rejected
</option>

</select>

<input
type="file"
id="photo"
accept="image/*">

</div>

<button
class="register-btn"
onclick="addUser()">
Register User
</button>

</div>

<!-- ========= TABLE ========= -->

<div class="section">

<h2>
Registered Applicants
</h2>

<div class="table-wrap">

<table>

<thead>

<tr>

<th>Photo</th>
<th>Name</th>
<th>Unique ID</th>
<th>ID Number</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="userdata">

</tbody>

</table>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyDMOQzKuw8IVrq0kh35tNC-P6PuiHlIA-g",

authDomain: "canada-visa-system-f9c45.firebaseapp.com",

projectId: "canada-visa-system-f9c45",

storageBucket: "canada-visa-system-f9c45.firebasestorage.app",

messagingSenderId: "772100856692",

appId: "1:772100856692:web:8e73ad0fe503b24342ea21",

measurementId: "G-046K5CHHJV"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.addUser = async function(){

const fullname =
document.getElementById("fullname").value;

const uniqueid =
document.getElementById("uniqueid").value;

const idnumber =
document.getElementById("idnumber").value;

const passport =
document.getElementById("passport").value;

const photoInput =
document.getElementById("photo");

const file =
photoInput.files[0];

if(
fullname==="" ||
uniqueid==="" ||
idnumber==="" ||
passport===""
){

alert("Fill all fields");

return;

}

let photoUrl="";

if(file){

const reader =
new FileReader();

reader.readAsDataURL(file);

photoUrl =
await new Promise((resolve)=>{

reader.onload = ()=>resolve(reader.result);

});

}

await addDoc(
collection(db,"users"),
{
fullname,
uniqueid,
idnumber,
passport,
photo:photoUrl
}
);

alert("Applicant Registered");

location.reload();

}

async function loadUsers(){

const querySnapshot =
await getDocs(
collection(db,"users")
);

const table =
document.getElementById("userdata");

table.innerHTML="";

let total=0;
let approved=0;
let rejected=0;
let processing=0;

querySnapshot.forEach((userDoc)=>{

total++;

const data = userDoc.data();

let statusClass="processing";

if(data.passport==="Approved"){

approved++;
statusClass="approved";

}else if(data.passport==="Rejected"){

rejected++;
statusClass="rejected";

}else{

processing++;

}

table.innerHTML += `

<tr>

<td>

<img
src="${data.photo}"
class="profile"
onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">

</td>

<td>${data.fullname}</td>

<td>${data.uniqueid}</td>

<td>${data.idnumber}</td>

<td>

<button class="status ${statusClass}">
${data.passport}
</button>

</td>

<td>

<button
class="action-btn edit">
Edit
</button>

<button
class="action-btn delete"
onclick="deleteUser('${userDoc.id}')">
Delete
</button>

</td>

</tr>

`;

});

document.getElementById("total").innerText=total;

document.getElementById("approvedCount").innerText=approved;

document.getElementById("rejectedCount").innerText=rejected;

document.getElementById("processingCount").innerText=processing;

}

window.deleteUser = async function(id){

await deleteDoc(
doc(db,"users",id)
);

location.reload();

}

loadUsers();

</script>

</body>
  </html>
