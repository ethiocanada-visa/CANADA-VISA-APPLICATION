<!-- ========= QR + PDF SECTION ========= -->

<div class="section">

Visa Certificate & QR Verification
</h2>

<label>
Applicant Unique ID
</label>

type="text"
id="qrUniqueID"

</div>

</div>

<button
class="register-btn"
onclick="generateCertificate()">

<i class="fa-solid fa-qrcode"></i>
Generate Certificate

</button>

<div
id="certificateBox"
style="
display:none;
margin-top:30px;
padding:30px;
border-radius:24px;
background:#f8fafc;
border:2px solid #dbe2ea;
">

<div style="
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:20px;
">

<div>

<h1 style="
font-size:32px;
font-weight:800;
color:#0f172a;
margin-bottom:10px;
">

Canada Visa Certificate

</h1>

<p style="
color:#64748b;
font-size:15px;
">

Official Embassy Verification Document

</p>

</div>

<img
src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=CanadaVisa"
id="qrImage"
style="
width:150px;
height:150px;
border-radius:16px;
background:white;
padding:10px;
">

</div>

<div style="
margin-top:30px;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
">

<div class="info-card">

<h4>Full Name</h4>

<p id="certName">-</p>

</div>

<div class="info-card">

<h4>Unique ID</h4>

<p id="certID">-</p>

</div>

<div class="info-card">

<h4>ID Number</h4>

<p id="certNumber">-</p>

</div>

<div class="info-card">

<h4>Visa Status</h4>

<p id="certStatus">-</p>

</div>

</div>

<button
onclick="downloadPDF()"
style="
margin-top:30px;
padding:16px 22px;
border:none;
border-radius:18px;
background:linear-gradient(
90deg,
#2563eb,
#1d4ed8
);
color:white;
font-size:16px;
font-weight:800;
cursor:pointer;
">

<i class="fa-solid fa-download"></i>
Download PDF

</button>

</div>

</div>

<style>

.info-card{
background:white;
padding:20px;
border-radius:18px;
border:1px solid #dbe2ea;
}

.info-card h4{
font-size:13px;
color:#64748b;
margin-bottom:10px;
}

.info-card p{
font-size:18px;
font-weight:800;
color:#0f172a;
}

</style>

<!-- ========= PDF LIBRARY ========= -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<!-- ========= ADD THIS INSIDE YOUR EXISTING SCRIPT ========= -->

<script>

window.generateCertificate = async function(){

const searchID =
document.getElementById("qrUniqueID").value;

const querySnapshot =
await getDocs(
collection(db,"users")
);

let found = false;

querySnapshot.forEach((doc)=>{

const data = doc.data();

if(data.uniqueid === searchID){

found = true;

document.getElementById("certificateBox").style.display="block";

document.getElementById("certName").innerText =
data.fullname;

document.getElementById("certID").innerText =
data.uniqueid;

document.getElementById("certNumber").innerText =
data.idnumber;

document.getElementById("certStatus").innerText =
data.passport;

document.getElementById("qrImage").src =
"https://api.qrserver.com/v1/create-qr-code/?size=150x150&data="
+
encodeURIComponent(
data.fullname +
" | " +
data.uniqueid +
" | " +
data.passport
);

}

});

if(!found){

alert("Applicant not found");

}

}

window.downloadPDF = function(){

const element =
document.getElementById("certificateBox");

html2pdf()
.from(element)
.save("Canada-Visa-Certificate.pdf");

}

  </script>
