<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canada Visa Dashboard</title>

<style>

body{
font-family:Arial,sans-serif;
background:linear-gradient(
135deg,
#eef4ff,
#f8fbff
);
margin:0;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
gap:10px;
}

.title{
color:#1f3c88;
font-size:32px;
font-weight:bold;
}

.btn{
padding:10px 18px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
opacity:0.9;
}

.green{
background:#d52b1e;
color:white;
}

.gray{
background:#ddd;
}

.blue{
background:#d52b1e;
color:white;
width:100%;
margin-top:15px;
font-size:16px;
}

.delete{
background:#e63946;
color:white;
}

.edit{
background:#ff9800;
color:white;
margin-right:5px;
}

.print{
background:#673ab7;
color:white;
margin-right:5px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
transition:0.3s;
border-left:6px solid #d52b1e;
}

.card:hover{
transform:translateY(-5px);
}

.form-box{
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

input{
padding:12px;
border:1px solid #ccc;
border-radius:8px;
width:100%;
box-sizing:border-box;
font-size:15px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#1f3c88;
color:white;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
font-size:14px;
}

.status{
padding:6px 10px;
border-radius:6px;
color:white;
font-size:13px;
}

.processing{
background:orange;
}

.approved{
background:green;
}

.rejected{
background:red;
}

.profile{
width:55px;
height:55px;
border-radius:50%;
object-fit:cover;
border:2px solid #d52b1e;
}

@media(max-width:700px){

.form-grid{
grid-template-columns:1fr;
}

table{
font-size:12px;
}

.btn{
padding:8px 12px;
font-size:12px;
}

.title{
font-size:24px;
}

}

</style>
</head>

<body>

<script>

if(localStorage.getItem("adminLoggedIn") !== "true"){

window.location.href = "login.html";

}

</script>

<div class="container">

<div class="header">

<div>
<h1 class="title">
🇨🇦 Canada Visa Admin Dashboard
</h1>

<p>
Manage applicants and passport status
</p>
</div>

<div>

<button class="btn green">
New Applicant
</button>

<button class="btn gray" onclick="logout()">
Logout
</button>

</div>

</div>

<div class="cards">

<div class="card">
<h4>Total Applicants</h4>
<h1 id="total">0</h1>
</div>

<div class="card">
<h4>Approved</h4>
<h1 id="approvedCount">0</h1>
</div>

<div class="card">
<h4>Rejected</h4>
<h1 id="rejectedCount">0</h1>
</div>

<div class="card">
<h4>Processing</h4>
<h1 id="processingCount">0</h1>
</div>

<div class="card">
<h4>System Status</h4>
<h1>Online</h1>
</div>

<div class="card">
<h4>Last Updated</h4>
<h1>2026</h1>
</div>

</div>

<div class="form-box">

<h2>Register Applicant</h2>

<div class="form-grid">

<input
type="text"
id="fullname"
placeholder="Full Name">

<input
type="text"
id="uniqueid"
placeholder="Unique ID">

<input
type="text"
id="idnumber"
placeholder="ID Number">

<input
type="text"
id="passport"
placeholder="Passport Status">

<input
type="file"
id="photo"
accept="image/*">

</div>

<button class="btn blue" onclick="addUser()">
Register User
</button>

</div>

<div class="form-box">

<h2>Registered Users</h2>

<input
type="text"
id="search"
placeholder="Search Applicant"
onkeyup="searchUser()"
style="
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
">

<table>

<thead>

<tr>
<th>Photo</th>
<th>Name</th>
<th>Unique ID</th>
<th>ID Number</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody id="userdata"></tbody>

</table>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyDMOQzKuw8IVrq0kh35tNC-P6PuiHlIA-g",

authDomain: "canada-visa-system-f9c45.firebaseapp.com",

projectId: "canada-visa-system-f9c45",

storageBucket: "canada-visa-system-f9c45.firebasestorage.app",

messagingSenderId: "772100856692",

appId: "1:772100856692:web:8e73ad0fe503b24342ea21",

measurementId: "G-046K5CHHJV"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.logout = function(){

localStorage.removeItem(
"adminLoggedIn"
);

window.location.href = "login.html";

}

window.addUser = async function(){

const fullname =
document.getElementById("fullname").value;

const uniqueid =
document.getElementById("uniqueid").value;

const idnumber =
document.getElementById("idnumber").value;

const passport =
document.getElementById("passport").value;

const photoInput =
document.getElementById("photo");

let photoUrl = "";

if(photoInput.files[0]){

const reader = new FileReader();

reader.onload = async function(e){

photoUrl = e.target.result;

await addDoc(collection(db,"users"),{

fullname,
uniqueid,
idnumber,
passport,
photo: photoUrl

});

alert("User Registered Successfully");

location.reload();

};

reader.readAsDataURL(
photoInput.files[0]
);

return;

  }

if(
fullname === "" ||
uniqueid === "" ||
idnumber === "" ||
passport === ""
){

alert("Please fill all fields");
return;

}


alert("User Registered Successfully");

location.reload();

}

async function loadUsers(){

const querySnapshot =
await getDocs(collection(db,"users"));

const table =
document.getElementById("userdata");

table.innerHTML = "";

let count = 0;
let approved = 0;
let rejected = 0;
let processing = 0;

querySnapshot.forEach((userDoc)=>{

count++;

const data = userDoc.data();

const status =
data.passport.toLowerCase();

let statusClass = "processing";

if(status.includes("approved")){

approved++;
statusClass = "approved";

}
else if(status.includes("rejected")){

rejected++;
statusClass = "rejected";

}
else{

processing++;
statusClass = "processing";

}

table.innerHTML += `

<tr>

<td>
<img
src="${data.photo}"
class="profile">
</td>

<td>${data.fullname}</td>

<td>${data.uniqueid}</td>

<td>${data.idnumber}</td>

<td>
<span class="status ${statusClass}">
${data.passport}
</span>
</td>

<td>

<button
class="btn print"
onclick="printSlip(
'${data.fullname}',
'${data.uniqueid}',
'${data.idnumber}',
'${data.passport}',
'${data.photo}'
)">
Print
</button>

<button
class="btn edit"
onclick="editUser(
'${data.fullname}',
'${data.uniqueid}',
'${data.idnumber}',
'${data.passport}'
)">
Edit
</button>

<button
class="btn delete"
onclick="deleteUser('${userDoc.id}')">
Delete
</button>

</td>

</tr>

`;

});

document.getElementById("total").innerText =
count;

document.getElementById("approvedCount").innerText =
approved;

document.getElementById("rejectedCount").innerText =
rejected;

document.getElementById("processingCount").innerText =
processing;

}

window.printSlip = function(
fullname,
uniqueid,
idnumber,
passport,
photo
){

const slip = window.open("","","width=600,height=700");

slip.document.write(`

<h2 style="text-align:center;color:#d52b1e;">
🇨🇦 Canada Visa Application Slip
</h2>

<div style="text-align:center;">

<img
src="${photo}"
width="120"
height="120"
style="
border-radius:12px;
object-fit:cover;
border:3px solid #d52b1e;
">

</div>

<br>

<hr>

<p><b>Full Name:</b> ${fullname}</p>

<p><b>Unique ID:</b> ${uniqueid}</p>

<p><b>ID Number:</b> ${idnumber}</p>

<p><b>Passport Status:</b> ${passport}</p>

<hr>

<h3 style="color:green;">
Application Received Successfully
</h3>

`);

slip.print();

}

window.editUser = function(
fullname,
uniqueid,
idnumber,
passport
){

document.getElementById("fullname").value =
fullname;

document.getElementById("uniqueid").value =
uniqueid;

document.getElementById("idnumber").value =
idnumber;

document.getElementById("passport").value =
passport;

}

window.deleteUser = async function(id){

await deleteDoc(doc(db,"users",id));

location.reload();

}

window.searchUser = function(){

const input =
document.getElementById("search")
.value.toLowerCase();

const rows =
document.querySelectorAll("#userdata tr");

rows.forEach((row)=>{

const text =
row.innerText.toLowerCase();

if(text.includes(input)){

row.style.display = "";

}else{

row.style.display = "none";

}

});

}

loadUsers();

</script>

</body>
  </html>
