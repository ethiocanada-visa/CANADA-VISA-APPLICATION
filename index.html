<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyDMOQzKuw8IVrq0kh35tNC-P6PuiHlIA-g",

authDomain: "canada-visa-system-f9c45.firebaseapp.com",

projectId: "canada-visa-system-f9c45",

storageBucket: "canada-visa-system-f9c45.firebasestorage.app",

messagingSenderId: "772100856692",

appId: "1:772100856692:web:8e73ad0fe503b24342ea21",

measurementId: "G-046K5CHHJV"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.addUser = async function(){

const fullname =
document.getElementById("fullname").value;

const uniqueid =
document.getElementById("uniqueid").value;

const idnumber =
document.getElementById("idnumber").value;

if(
fullname === "" ||
uniqueid === "" ||
idnumber === ""
){

alert("Please fill all fields");

return;

}

await addDoc(collection(db, "users"), {

fullname: fullname,

uniqueid: uniqueid,

idnumber: idnumber

});

alert("User Registered Successfully");

location.reload();

};

async function loadUsers(){

const querySnapshot =
await getDocs(collection(db, "users"));

const table =
document.getElementById("userdata");

table.innerHTML = "";

querySnapshot.forEach((doc) => {

const data = doc.data();

table.innerHTML += `

<tr>

<td>${data.fullname}</td>

<td>${data.uniqueid}</td>

<td>${data.idnumber}</td>

<td>

<button class="btn delete">
Saved
</button>

</td>

</tr>

`;

});

}

loadUsers();

  </script>
