<!-- ========= PREMIUM CANADA EMBASSY STYLE ========= -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#f4f7fb;
display:flex;
color:#111827;
}

/* ========= SIDEBAR ========= */

.sidebar{
width:270px;
height:100vh;
position:fixed;
left:0;
top:0;
background:linear-gradient(
180deg,
#ffffff,
#edf3ff
);
border-right:1px solid #e5e7eb;
overflow:hidden;
z-index:999;
}

.sidebar::before{
content:"";
position:absolute;
bottom:0;
left:0;
width:100%;
height:320px;
background:url('https://images.unsplash.com/photo-1517935706615-2717063c2225?q=80&w=1200');
background-size:cover;
background-position:center;
opacity:0.12;
}

.logo-box{
padding:28px 24px;
position:relative;
z-index:2;
}

.logo-box img{
width:75px;
margin-bottom:10px;
}

.logo-box h1{
font-size:42px;
font-weight:800;
color:#111827;
line-height:1;
}

.logo-box p{
font-size:13px;
color:#6b7280;
margin-top:10px;
line-height:1.6;
}

.menu{
padding:0 18px;
position:relative;
z-index:2;
}

.menu a{
display:flex;
align-items:center;
gap:14px;
padding:16px 18px;
border-radius:16px;
text-decoration:none;
color:#0b2c5f;
font-size:15px;
font-weight:600;
margin-bottom:10px;
transition:.3s;
}

.menu a:hover{
background:#eef2ff;
}

.menu .active{
background:linear-gradient(
90deg,
#d52b1e,
#ff3b30
);
color:white;
box-shadow:0 10px 20px rgba(213,43,30,0.25);
}

/* ========= MAIN ========= */

.main{
margin-left:270px;
width:calc(100% - 270px);
padding:25px;
}

/* ========= TOPBAR ========= */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
flex-wrap:wrap;
margin-bottom:25px;
}

.title-area{
display:flex;
align-items:center;
gap:16px;
}

.title-area img{
width:60px;
}

.title-area h1{
font-size:42px;
font-weight:800;
color:#0b2c5f;
}

.title-area p{
font-size:15px;
color:#6b7280;
margin-top:6px;
}

.top-actions{
display:flex;
align-items:center;
gap:15px;
flex-wrap:wrap;
}

.search-box{
background:white;
padding:14px 18px;
border-radius:16px;
border:1px solid #e5e7eb;
width:320px;
font-size:15px;
outline:none;
}

.admin-box{
background:white;
padding:10px 16px;
border-radius:18px;
display:flex;
align-items:center;
gap:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

.admin-box img{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
}

.admin-box h4{
font-size:16px;
}

.admin-box p{
font-size:13px;
color:#16a34a;
}

/* ========= STATS ========= */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:22px;
margin-bottom:25px;
}

.card{
background:white;
padding:28px;
border-radius:24px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
border:1px solid #eef2f7;
}

.card h3{
font-size:16px;
color:#6b7280;
margin-bottom:10px;
}

.card h1{
font-size:46px;
font-weight:800;
color:#0b2c5f;
}

.card p{
font-size:14px;
color:#9ca3af;
margin-top:10px;
}

.icon{
width:78px;
height:78px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
font-weight:800;
}

.blue{
background:#eef2ff;
color:#3b82f6;
}

.green{
background:#ecfdf3;
color:#16a34a;
}

.red{
background:#fef2f2;
color:#dc2626;
}

.orange{
background:#fff7ed;
color:#f59e0b;
}

/* ========= SECTION ========= */

.section{
background:white;
border-radius:24px;
padding:28px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
margin-bottom:25px;
border:1px solid #eef2f7;
}

.section-title{
font-size:30px;
font-weight:800;
color:#0b2c5f;
margin-bottom:25px;
}

/* ========= FORM ========= */

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.input-group{
display:flex;
flex-direction:column;
gap:8px;
}

.input-group label{
font-size:14px;
font-weight:700;
color:#374151;
}

input,
select{
padding:16px;
border-radius:14px;
border:1px solid #d1d5db;
font-size:15px;
outline:none;
background:white;
transition:.3s;
}

input:focus,
select:focus{
border-color:#3b82f6;
box-shadow:0 0 0 4px rgba(59,130,246,0.08);
}

.register-btn{
margin-top:22px;
background:linear-gradient(
90deg,
#d52b1e,
#ff3b30
);
border:none;
width:100%;
padding:17px;
border-radius:16px;
color:white;
font-size:17px;
font-weight:800;
cursor:pointer;
box-shadow:0 10px 25px rgba(213,43,30,0.25);
}

/* ========= TABLE ========= */

.table-header{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:15px;
margin-bottom:20px;
}

.table-search{
padding:14px 18px;
border-radius:14px;
border:1px solid #d1d5db;
width:280px;
outline:none;
}

.table-wrap{
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:1100px;
}

thead{
background:#0b2c5f;
color:white;
}

th{
padding:18px;
text-align:left;
font-size:14px;
}

td{
padding:18px;
border-bottom:1px solid #eef2f7;
font-size:14px;
}

.profile{
width:70px;
height:70px;
border-radius:18px;
object-fit:cover;
border:3px solid #d52b1e;
}

.status{
padding:10px 14px;
border:none;
border-radius:12px;
font-size:13px;
font-weight:700;
color:white;
}

.processing{
background:#f59e0b;
}

.approved{
background:#16a34a;
}

.rejected{
background:#dc2626;
}

.action-btn{
padding:10px 14px;
border:none;
border-radius:12px;
font-size:13px;
font-weight:700;
cursor:pointer;
color:white;
margin:2px;
}

.print{
background:#7c3aed;
}

.edit{
background:#f59e0b;
}

.delete{
background:#dc2626;
}

/* ========= NOTIFICATION ========= */

#notification{
position:fixed;
top:20px;
right:20px;
background:#16a34a;
color:white;
padding:16px 24px;
border-radius:14px;
display:none;
font-weight:700;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
z-index:99999;
}

/* ========= MOBILE ========= */

@media(max-width:1000px){

.sidebar{
display:none;
}

.main{
margin-left:0;
width:100%;
padding:15px;
}

.form-grid{
grid-template-columns:1fr;
}

.title-area h1{
font-size:28px;
}

.search-box{
width:100%;
}

.cards{
grid-template-columns:1fr;
}

}

  </style>
